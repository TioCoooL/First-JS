<!DOCTYPE html>
<html>
    <head>
        <title>Javascript</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
    </head>

    <body id="body"> 
        <div class="w3-container w3-center">
            <button class="w3-button w3-black w3-margin w3-center" onclick="random()">Change</button>
            <br>
            <div class="w3-panel w3-leftbar w3-light-grey">
                <i><p class="w3-xlarge w3-serif" id="quote"></p></i>
            </div>
        </div>
        
        <script>
            var qut = [
                '“Programmer: A machine that turns coffee into code.”',
                '“When I wrote this code, only God and I understood what I did. Now only God knows.”',
                '“Computers are fast; programmers keep it slow.”',
                '“A son asked his father (a programmer) why the sun rises in the east, and sets in the west. His response? It works, don’t touch!”',
                '“How many programmers does it take to change a light bulb? None, that’s a hardware problem.”',
                '“Programming is like sex: One mistake and you have to support it for the rest of your life.”',
                '“Programming can be fun, and so can cryptography; however, they should not be combined.”',
                '“Programming today is a race between software engineers striving to build bigger and better idiot-proof programs, and the Universe trying to produce bigger and better idiots. So far, the Universe is winning.”',
                '“Copy-and-Paste was programmed by programmers for programmers actually.” ',
                '“Always code as if the person who ends up maintaining your code will be a violent psychopath who knows where you live.”', 
            ];

            function random() {
                var text = ""
                var num = Number(Math.floor(Math.random() * qut.length))
                text = qut[num];
                document.getElementById("quote").innerHTML = text;
            }
        </script>
        <a href="links-extented.html">Back</a>
    </body>
</html>
