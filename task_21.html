<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javasript</title>
    </head>
    <body>
        <script type="text/javascript">            
            var elec = 'list of electric : ';       
            var wat = 'list of water : ';
            var name;
            for(var counter = 1; counter <= 3; counter++) {
                name = prompt('Pokemon Name:')
                if (name == 'pikachu' || name == 'raichu' || name == 'elekid') {
                    elec += name + ', ';
                } else if (name == 'squirtle' || name == 'lapras' || name == 'greninja') {
                    wat += name + ', ';
                }
            }

            console.log(elec);
            console.log(wat);
        </script>

        <a href="links.html">Back</a>
    </body>
</html>
