<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javasript</title>
    </head>
    <body>
        <script type="text/javascript">            
            var bot;
            var user;
            for (var counter = 0; counter < 3; counter++) {
                bot = Math.floor(Math.random() * 3);
                user = prompt('batu, gunting atau kertas?')
                if (user == 'batu') {
                    if (bot == 0) {
                        console.log('User ' + user + ' Vs Computer batu = Draw')
                    } else if (bot == 1) {
                        console.log('User ' + user + ' Vs Computer kertas = Computer Wins')
                    } else if (bot == 2) {
                        console.log('User ' + user + ' Vs Computer gunting = User Wins')
                    }
                } else if (user == 'gunting') {
                    if (bot == 0) {
                        console.log('User ' + user + ' Vs Computer batu = Computer Wins')
                    } else if (bot == 1) {
                        console.log('User ' + user + ' Vs Computer kertas = User Wins')
                    } else if (bot == 2) {
                        console.log('User ' + user + ' Vs Computer gunting = Draw')
                    }
                } else if (user == 'kertas') {
                    if (bot == 0) {
                        console.log('User ' + user + ' Vs Computer batu = User Wins')
                    } else if (bot == 1) {
                        console.log('User ' + user + ' Vs Computer kertas = Draw')
                    } else if (bot == 2) {
                        console.log('User ' + user + ' Vs Computer gunting = Computer Wins')
                    }
                }
            }
        </script>

        <a href="links.html">Back</a>
    </body>
</html>
