<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Javasript</title>
    </head>
    <body>
        <script type="text/javascript">
            var counter;
            var add;
            add = 0;
            counter = 0;
            while (counter < 10) {
                add += Number(prompt('Number: '));
                counter += 1;
            }

            alert('the total is ' + add);
        </script>
    </body>
</html>
