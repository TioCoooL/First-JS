    <body>
        <script type="text/javascript">    
            var fruits = [];        
            function push(fruit) {
                fruits.push(fruit)
            }
            
            var newFruit;
            for (var i = 1; i <= 3; i++) {
                newFruit = prompt('Fruits?')
                fruits.push(newFruit);
            }

            console.log(fruits);
        </script>
